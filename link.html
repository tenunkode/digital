<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TenunKode — Link</title>
    <meta name="description" content="Temukan semua link penting TenunKode Digital di satu tempat." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      :root {
        --navy: #1a3a4a;
        --navy-light: #1f4560;
        --orange: #d37232;
        --tan: #e6b363;
        --cream: #f9f9f7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background-color: var(--navy);
        background-image:
          radial-gradient(ellipse at 20% 20%, rgba(211, 114, 50, 0.18) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(230, 179, 99, 0.12) 0%, transparent 50%),
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 36px 36px, 36px 36px;
        overflow-x: hidden;
      }

      /* Animated floating orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
        animation: floatOrb 8s ease-in-out infinite;
      }
      .orb-1 {
        width: 300px;
        height: 300px;
        background: rgba(211, 114, 50, 0.2);
        top: -80px;
        left: -80px;
        animation-delay: 0s;
      }
      .orb-2 {
        width: 250px;
        height: 250px;
        background: rgba(230, 179, 99, 0.15);
        bottom: -60px;
        right: -60px;
        animation-delay: 3s;
      }
      .orb-3 {
        width: 180px;
        height: 180px;
        background: rgba(211, 114, 50, 0.1);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: 5s;
      }

      @keyframes floatOrb {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-30px) scale(1.05); }
      }

      /* Card container */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }

      /* Logo area */
      .logo-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        animation: fadeDown 0.7s ease both;
        margin-bottom: 0.5rem;
      }

      .logo-img-wrap {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: rgba(255,255,255,0.07);
        border: 2px solid rgba(211, 114, 50, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow:
          0 0 0 6px rgba(211, 114, 50, 0.08),
          0 8px 32px rgba(0,0,0,0.4);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .logo-img-wrap:hover {
        transform: scale(1.05);
        box-shadow:
          0 0 0 8px rgba(211, 114, 50, 0.15),
          0 12px 40px rgba(0,0,0,0.5);
      }
      .logo-img-wrap img {
        width: 90px;
        height: 90px;
        object-fit: contain;
        border-radius: 50%;
      }

      .brand-name {
        font-family: "Playfair Display", serif;
        font-weight: 900;
        font-size: 1.6rem;
        color: var(--cream);
        letter-spacing: -0.5px;
        text-align: center;
      }
      .brand-name span {
        color: var(--orange);
        font-style: italic;
      }

      .brand-tagline {
        font-size: 0.78rem;
        font-weight: 500;
        color: rgba(249,249,247,0.5);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 0.5rem;
      }

      .brand-jargon {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--tan);
        text-align: center;
        margin-top: 0.35rem;
        line-height: 1.5;
        letter-spacing: 0.01em;
      }

      /* Divider */
      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--orange), transparent);
        border-radius: 9999px;
        animation: fadeDown 0.7s 0.2s ease both;
      }

      /* Link buttons */
      .link-btn {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.4rem;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        position: relative;
        overflow: hidden;
      }
      .link-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        background: rgba(255,255,255,0.06);
        transition: opacity 0.25s ease;
      }
      .link-btn:hover::before {
        opacity: 1;
      }
      .link-btn:hover {
        transform: translateY(-3px);
      }
      .link-btn:active {
        transform: translateY(0px) scale(0.98);
      }

      /* Icon container */
      .btn-icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.15rem;
        flex-shrink: 0;
      }

      /* Text area */
      .btn-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }
      .btn-label {
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.2;
      }
      .btn-sub {
        font-size: 0.75rem;
        font-weight: 400;
        opacity: 0.65;
        line-height: 1.3;
      }

      /* Arrow */
      .btn-arrow {
        font-size: 0.8rem;
        opacity: 0.5;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }
      .link-btn:hover .btn-arrow {
        transform: translateX(4px);
        opacity: 0.9;
      }

      /* Website button — orange style */
      .btn-website {
        background: linear-gradient(135deg, rgba(211,114,50,0.18) 0%, rgba(211,114,50,0.1) 100%);
        border: 1.5px solid rgba(211, 114, 50, 0.35);
        color: var(--cream);
        box-shadow: 0 4px 24px rgba(211, 114, 50, 0.12), inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .btn-website:hover {
        box-shadow: 0 8px 36px rgba(211, 114, 50, 0.28), inset 0 1px 0 rgba(255,255,255,0.08);
        border-color: rgba(211, 114, 50, 0.6);
      }
      .btn-website .btn-icon {
        background: rgba(211, 114, 50, 0.2);
        color: var(--orange);
      }
      .btn-website .btn-label {
        color: var(--cream);
      }

      /* WA button — green style */
      .btn-wa {
        background: linear-gradient(135deg, rgba(37,211,102,0.14) 0%, rgba(37,211,102,0.07) 100%);
        border: 1.5px solid rgba(37, 211, 102, 0.3);
        color: var(--cream);
        box-shadow: 0 4px 24px rgba(37, 211, 102, 0.1), inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .btn-wa:hover {
        box-shadow: 0 8px 36px rgba(37, 211, 102, 0.25), inset 0 1px 0 rgba(255,255,255,0.08);
        border-color: rgba(37, 211, 102, 0.55);
      }
      .btn-wa .btn-icon {
        background: rgba(37, 211, 102, 0.15);
        color: #25d366;
      }
      .btn-wa .btn-label {
        color: var(--cream);
      }

      /* Instagram button */
      .btn-ig {
        background: linear-gradient(135deg, rgba(193,53,132,0.15) 0%, rgba(131,58,180,0.1) 50%, rgba(253,29,29,0.08) 100%);
        border: 1.5px solid rgba(193, 53, 132, 0.3);
        color: var(--cream);
        box-shadow: 0 4px 24px rgba(193, 53, 132, 0.1), inset 0 1px 0 rgba(255,255,255,0.06);
      }
      .btn-ig:hover {
        box-shadow: 0 8px 36px rgba(193, 53, 132, 0.28), inset 0 1px 0 rgba(255,255,255,0.08);
        border-color: rgba(193, 53, 132, 0.55);
      }
      .btn-ig .btn-icon {
        background: linear-gradient(135deg, rgba(193,53,132,0.25), rgba(131,58,180,0.2));
        color: #e1306c;
        font-size: 1.25rem;
      }
      .btn-ig .btn-label {
        color: var(--cream);
      }

      /* Footer */
      .footer {
        font-size: 0.72rem;
        color: rgba(249,249,247,0.3);
        text-align: center;
        letter-spacing: 0.05em;
        animation: fadeUp 0.7s 0.7s ease both;
      }
      .footer span {
        color: rgba(211, 114, 50, 0.6);
      }

      /* Animations */
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .anim-1 { animation: fadeUp 0.6s 0.1s ease both; }
      .anim-2 { animation: fadeUp 0.6s 0.25s ease both; }
      .anim-3 { animation: fadeUp 0.6s 0.4s ease both; }
      .anim-4 { animation: fadeUp 0.6s 0.55s ease both; }

      /* Hover ripple effect */
      @keyframes ripple {
        to { transform: scale(4); opacity: 0; }
      }
    </style>
  </head>
  <body>

    <!-- Ambient orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <!-- Main card -->
    <main class="card" role="main">

      <!-- Logo & brand -->
      <div class="logo-wrapper">
        <div class="logo-img-wrap">
          <img src="tenunkodelogo.png" alt="Logo TenunKode" />
        </div>
        <div>
          <p class="brand-name">Tenun<span>Kode</span></p>
          <p class="brand-tagline">Digital Agency</p>
          <p class="brand-jargon">Menenun Ide, Menjadi Realitas Digital.</p>
        </div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Website link -->
      <a
        id="btn-website"
        href="https://tenunkode.github.io/digital/"
        target="_blank"
        rel="noopener noreferrer"
        class="link-btn btn-website anim-1"
        aria-label="Kunjungi website TenunKode Digital"
      >
        <div class="btn-icon" aria-hidden="true">
          <i class="fa-solid fa-globe"></i>
        </div>
        <div class="btn-text">
          <span class="btn-label">Website</span>
          <span class="btn-sub">tenunkode.github.io/digital</span>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow" aria-hidden="true"></i>
      </a>

      <!-- Kontak WA link -->
      <a
        id="btn-whatsapp"
        href="https://api.whatsapp.com/send/?phone=6281252761543&text=Halo+TenunKode%21+%EF%BF%BD%0A%0ASaya+ingin+bertanya+lebih+lanjut+mengenai+layanan+yang+Anda+tawarkan.%0A%0ASaya+%5Bnama+Anda%5D+dari+%5Binstansi%2Fbisnis%5D+dan+sedang+membutuhkan+solusi+digital+untuk+%5Bjelaskan+kebutuhan%5D.%0A%0AApakah+bisa+kita+diskusi+lebih+lanjut%3F+Terima+kasih%21+%EF%BF%BD&type=phone_number&app_absent=0"
        target="_blank"
        rel="noopener noreferrer"
        class="link-btn btn-wa anim-2"
        aria-label="Chat dengan TenunKode via WhatsApp"
      >
        <div class="btn-icon" aria-hidden="true">
          <i class="fa-brands fa-whatsapp"></i>
        </div>
        <div class="btn-text">
          <span class="btn-label">Kontak Kami</span>
          <span class="btn-sub">Chat via WhatsApp</span>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow" aria-hidden="true"></i>
      </a>

      <!-- Instagram link -->
      <a
        id="btn-instagram"
        href="https://www.instagram.com/tenunkode.digital/"
        target="_blank"
        rel="noopener noreferrer"
        class="link-btn btn-ig anim-3"
        aria-label="Ikuti TenunKode di Instagram"
      >
        <div class="btn-icon" aria-hidden="true">
          <i class="fa-brands fa-instagram"></i>
        </div>
        <div class="btn-text">
          <span class="btn-label">Instagram</span>
          <span class="btn-sub">@tenunkode.digital</span>
        </div>
        <i class="fa-solid fa-arrow-right btn-arrow" aria-hidden="true"></i>
      </a>

      <!-- Footer -->
      <p class="footer anim-4">
        © 2026 <span>TenunKode Digital</span> · Menenun Ide Menjadi Realitas
      </p>

    </main>

  </body>
</html>
